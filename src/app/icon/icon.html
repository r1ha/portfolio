<!-- filter definition -->
<svg width="0" height="0" class="absolute pointer-events-none">
  <filter id="liquid-refraction">
    <!-- Génère une texture de "vagues" -->
    <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" result="turbulence" />
    <!-- Déforme l'image en utilisant la texture -->
    <feDisplacementMap in="SourceGraphic" in2="turbulence" scale="4" xChannelSelector="R" yChannelSelector="G" />
  </filter>
</svg>

<div class="w-16 h-16 p-2 rounded-full bg-white/10 backdrop-blur-2xl hover:bg-white/20 flex items-center justify-center">

    <a [href]="link" target="_blank" rel="noreferrer" class="w-full h-full flex items-center justify-center">
        <img [ngSrc]="src" width="32" height="32" alt="{{ alt }}" class="w-4/5 h-4/5" />
    </a>

</div>
