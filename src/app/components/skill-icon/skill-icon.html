<div class="tooltip">
  <div class="tooltip-content">
    <div class="animate-bounce text-orange-400 -rotate-10 text-2xl font-black">{{ name }}</div>
    <div class="text-white -rotate-10 font-bold text-center">{{ level }}</div>
  </div>
  <img [src]="image" [style.width.px]="size" [style.height.px]="size" [alt]="name" class="skill-icon-img" />
</div>
