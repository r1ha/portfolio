<div class="hover-3d my-12 mx-2 cursor-pointer">
  <!-- content -->
  <div class="card  bg-gray-950 text-white bg-[radial-gradient(circle_at_bottom_left,#ffffff04_35%,transparent_36%),radial-gradient(circle_at_top_right,#ffffff04_35%,transparent_36%)] rounded-xl w-96 h-48 bg-size-[4.95em_4.95em]">
    <div class="card-body">
      <div class="flex columns-2 gap-3">
        <!-- first col: portrait -->
        <img
          [ngSrc]="'assets/pictures/portrait.jpg'"
          class="w-32 aspect-square object-cover rounded-sm"
          width="128"
          height="128"
          alt="Portrait of {{ personalInfo.firstName + ` ` + personalInfo.lastName }}"
        />

        <!-- second col: textual information -->
        <div class="">
          <!-- profile -->
          <h1 class="font-semibold text-lg">
            {{ personalInfo.firstName + ` ` + personalInfo.lastName }}
          </h1>
          <p>{{ personalInfo.title }}</p>

          <p>📍 {{ personalInfo.location }}</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 8 empty divs needed for the 3D effect -->
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
  <div></div>
</div>
