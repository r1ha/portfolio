<div
  class="w-full max-w-4xl mx-auto rounded-3xl bg-zinc-900 p-8 md:p-12 shadow-2xl border border-zinc-800/80"
>
  <h2 class="text-3xl font-bold text-white">Prenons contact</h2>

  <p class="mt-2 mb-10 text-gray-400">Vous avez une question, un projet ou autre chose ? Envoyez-moi un message.</p>

  <form action="https://formspree.io/f/xaqrpezj" method="POST" class="space-y-6">
    <div>
      <label class="mb-2 block text-sm font-medium text-gray-300"> Nom </label>

      <div class="relative">
        <input
          type="text"
          name="name"
          [value]="name()"
          (input)="nameChanged($event)"
          placeholder="Votre nom"
          required
          class="w-full rounded-xl border border-zinc-700 bg-zinc-800/60 px-5 py-3 text-white placeholder-gray-500 transition focus:border-white focus:ring-4 focus:ring-white/10 focus:outline-none"
        />
      </div>
    </div>

    <div>
      <label class="mb-2 block text-sm font-medium text-gray-300"> Email </label>

      <div class="relative">
        <input
          type="email"
          [value]="email()"
          (input)="emailChanged($event)"
          name="email"
          placeholder="votre@email.com"
          required
          class="w-full rounded-xl border border-zinc-700 bg-zinc-800/60 px-5 py-3 pr-10 text-white placeholder-gray-500 transition focus:border-white focus:ring-4 focus:ring-white/10 focus:outline-none"
        />
        <span
          class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none transition-opacity duration-150"
          [class.opacity-0]="!email()"
        >
          <img
            [src]="'assets/validation_icons/' + (emailIsValid(email()) ? 'checkmark' : 'cross') + '.svg'"
            alt=""
            class="w-5 h-5"
          />
        </span>
      </div>
    </div>

    <div>
      <label class="mb-2 block text-sm font-medium text-gray-300"> Message </label>

      <div class="relative">
        <textarea
          name="message"
          [value]="message()"
          (input)="messageChanged($event)"
          rows="6"
          placeholder="Dîtes-moi tout..."
          required
          class="w-full resize-none rounded-xl border border-zinc-700 bg-zinc-800/60 px-5 py-3 text-white placeholder-gray-500 transition focus:border-white focus:ring-4 focus:ring-white/10 focus:outline-none"
        ></textarea>
      </div>
    </div>

    <button
      [disabled]="!formValid()"
      type="submit"
      class="btn btn-neutral w-full rounded-xl bg-white text-zinc-900 py-3 font-semibold transition hover:bg-zinc-200 active:scale-[0.99] cursor-pointer disabled:cursor-not-allowed disabled:bg-zinc-800 disabled:text-zinc-600 disabled:hover:bg-zinc-800"
    >
      Envoyer le message
    </button>
  </form>

  @if (!formValid()) {
    <p class="mt-4 text-sm text-center text-gray-400">
      {{ formMessage() }}
    </p>
  }
</div>
