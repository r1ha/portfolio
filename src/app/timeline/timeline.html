<div class="tl">
  @for (entry of entries; track $index) {
    <div
      class="tl-item"
      [class.tl-item--left]="$index % 2 === 0"
      [class.tl-item--right]="$index % 2 !== 0"
      #timelineItem
    >
      <div class="tl-item__content">
        <app-timeline-element
          [year]="entry.year"
          [title]="entry.title"
          [summary]="entry.summary"
          [logo]="entry.logo"
        />
      </div>
      <div class="tl-item__marker">
        <svg viewBox="0 0 24 24" class="w-5 h-5">
          <circle cx="12" cy="12" r="9" fill="white" />
        </svg>
      </div>
    </div>
  }
</div>
