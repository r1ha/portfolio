<div class="page-shell">

  <header class="hero">
    <div class="hero-copy">
      <p class="eyebrow">Portfolio Angular</p>
      <h1>Une single page pour présenter le parcours sans perdre la navigation.</h1>
      <p class="hero-text">
        L'app est découpée en sections routées pour aller rapidement vers l'essentiel:
        A propos, Expériences et Compétences.
      </p>
    </div>

    <app-navbar></app-navbar>

    <nav class="nav" aria-label="Navigation du portfolio">
      @for (item of navItems; track item.path) {
        <a
          class="nav-link"
          [routerLink]="item.path"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          {{ item.label }}
        </a>
      }
    </nav>
  </header>

  <main class="content" id="contenu-principal">
    <router-outlet></router-outlet>
  </main>
</div>
